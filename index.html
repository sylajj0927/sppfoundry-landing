<!doctype html>
<html lang="zh-Hant">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SPP Foundry</title>
  <meta name="description" content="SPP Foundry — AI × Vibe Coding 陪跑實驗室" />

  <!-- JSON-LD: Organization -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "SPP Foundry",
    "url": "https://sppfoundry.co",
    "contactPoint": {
      "@type": "ContactPoint",
      "email": "hello@sppfoundry.co",
      "contactType": "customer support"
    }
  }

  <style>
    :root {
      color-scheme: light;
    }

    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 0;
      color: #111;
      background: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 56px 24px 40px;
      width: 100%;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 40px;
      letter-spacing: -0.02em;
      font-weight: 700;
    }

    p {
      margin: 0 0 16px;
      line-height: 1.6;
      color: #374151;
      /* gray-700 */
    }

    .muted {
      color: #6b7280;
      /* gray-500 */
      font-size: 18px;
      margin-bottom: 32px;
    }

    /* 分區標題 */
    h2 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #9ca3af;
      /* gray-400 */
      margin: 40px 0 16px;
      font-weight: 600;
    }

    /* 連結列表樣式 */
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-item {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      font-size: 16px;
      color: #111;
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
      padding-bottom: 2px;
      width: fit-content;
      transition: all 0.2s ease;
    }

    .link-item:hover {
      border-bottom-color: #000;
      color: #000;
    }

    /* Footer 設計 (仿 Tailwind 樣式) */
    footer {
      margin-top: auto;
      border-top: 1px solid #f3f4f6;
      /* border-gray-100 */
      padding: 32px 24px;
      background-color: rgba(255, 255, 255, 0.5);
      /* bg-white/50 */
      backdrop-filter: blur(4px);
      /* backdrop-blur-sm */
      -webkit-backdrop-filter: blur(4px);
    }

    .footer-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
    }

    .footer-left {
      color: #6b7280;
      /* text-gray-500 */
      font-weight: 500;
    }

    .footer-right a {
      color: #6b7280;
      /* text-gray-500 */
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-right a:hover {
      color: #111;
      /* hover:text-gray-900 */
    }

    /* 手機版 RWD 設定 */
    @media (max-width: 640px) {

      /* md breakpoint */
      main {
        padding-top: 60px;
      }

      h1 {
        font-size: 32px;
      }

      .footer-inner {
        flex-direction: column;
        /* flex-col */
        gap: 16px;
        /* gap-4 */
        text-align: center;
      }
    }
  </style>
</head>

<body>
  <main>
    <h1>SPP Foundry</h1>
    <p class="muted">AI × Vibe Coding 產品陪跑實驗室</p>
    <p>從產品發想到落地，陪你做出第一個可用版本。</p>

    <h2>Lab Projects</h2>
<div class="links">

  </a>
  <a href="https://boom.sppfoundry.co" target="_blank" rel="noopener" class="link-item">
    BOOM — 2026 新年祝福產生器
  </a>
  <a href="/labs/aicert/" class="link-item">AICert</a>
  <a href="/labs/flow-booking/" class="link-item">Flow Booking</a>
</div>

    <h2>Connect</h2>
    <div class="links">
      <a href="https://www.threads.net/@spp_chang" target="_blank" rel="noopener" class="link-item">Threads</a>
      <a href="https://www.facebook.com/sylajj" target="_blank" rel="noopener" class="link-item">Facebook</a>
    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <div class="footer-left">© SPP Foundry</div>
      <div class="footer-right">
        <a href="mailto:hello@sppfoundry.co">hello@sppfoundry.co</a>
      </div>
    </div>
  </footer>
</body>

</html>
